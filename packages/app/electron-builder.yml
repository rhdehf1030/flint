appId: com.flint.app
productName: Flint
copyright: Copyright © 2024 Flint Contributors

directories:
  buildResources: build
  output: dist-app

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: ../../packages/core/dist
    to: core/dist
    filter:
      - "**/*"

win:
  target:
    - zip
  signingHashAlgorithms: []
  sign: null

linux:
  target:
    - AppImage
  category: Development

publish: null
